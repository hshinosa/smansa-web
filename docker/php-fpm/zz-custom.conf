[global]
; Override error_log to use stdout directly
error_log = /dev/stderr

[www]
; Don't change user/group, let entrypoint handle it or run as root
; user = www-data
; group = www-data

; Ensure logs work
access.log = /dev/stdout
catch_workers_output = yes
decorate_workers_output = no

; ---------- Process Manager ----------
; Default php:8.4-fpm-alpine ships with pm.max_children=5 which bottlenecks
; under modest load (search bots, asset bursts) and produces "server reached
; pm.max_children" warnings. Bump pool to handle realistic concurrency.
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6

; Recycle each worker after this many requests. Critical for long-running
; containers: prevents opcache drift, memory accumulation, and stale state
; that previously caused redirect-loop incidents after 12+ days of uptime.
pm.max_requests = 500

; Slow request logging - helps diagnose hangs without restarting the worker.
request_slowlog_timeout = 10s
slowlog = /dev/stderr
