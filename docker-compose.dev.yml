name: sman1baleendah-dev

services:
  # PostgreSQL with pgvector
  db:
    image: pgvector/pgvector:pg16
    container_name: sman1-dev-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smansa-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123hshi
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - sman1-dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smansa-db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: sman1-dev-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - sman1-dev-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PHP 8.3 Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: php-builder
    container_name: sman1-dev-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www:cached
      - /var/www/node_modules
      - /var/www/vendor
    ports:
      - "9000:9000"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=smansa-db
      - DB_USERNAME=postgres
      - DB_PASSWORD=123hshi
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=database
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sman1-dev-network
    command: php-fpm

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: sman1-dev-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www:cached
      - ./docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - sman1-dev-network

  # Queue Worker
  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: php-builder
    container_name: sman1-dev-queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www:cached
      - /var/www/node_modules
      - /var/www/vendor
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=smansa-db
      - DB_USERNAME=postgres
      - DB_PASSWORD=123hshi
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: php artisan queue:work --sleep=1 --tries=1 --queue=default,instagram
    networks:
      - sman1-dev-network

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local

networks:
  sman1-dev-network:
    driver: bridge